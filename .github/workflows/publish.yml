name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # Required for npm Trusted Publisher (OIDC)

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        if: github.ref == 'refs/heads/main'
        run: npm publish
        env:
          # Unset token so npm uses OIDC trusted publishing instead of NPM_TOKEN
          NODE_AUTH_TOKEN: ''
